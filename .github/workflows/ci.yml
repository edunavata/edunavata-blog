name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, lint, format & build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Astro build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Type-check, lint & format
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://edunavata-blog.pages.dev' }}
