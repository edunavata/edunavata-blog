name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, lint, format & build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Astro build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            astro-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check, lint & format
        run: pnpm run check

      - name: Unit tests
        run: pnpm test

      - name: Build site
        run: pnpm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://edunavata.com' }}
